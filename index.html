<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursor Usage Dashboard</title>
    <style>
        :root {
            --bg: #0f1419;
            --surface: #1a222d;
            --text: #e8eef4;
            --muted: #8b9aab;
            --accent: #3ecf8e;
            --border: #2d3a4a;
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", system-ui, sans-serif;
            background: radial-gradient(circle at top, #17202b 0%, var(--bg) 55%);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        main {
            width: min(520px, 100%);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
        }

        h1 {
            margin: 0 0 0.5rem;
            font-size: 1.5rem;
        }

        p {
            margin: 0 0 1.5rem;
            color: var(--muted);
            line-height: 1.5;
        }

        .locale-toolbar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
        }

        .locale-toolbar__label {
            font-size: 0.78rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .locale-btn {
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            border-radius: 6px;
            padding: 0.28rem 0.55rem;
            font-size: 0.78rem;
            cursor: pointer;
        }

        .locale-btn--active {
            border-color: var(--accent);
            color: var(--accent);
        }

        ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: grid;
            gap: 0.75rem;
        }

        a {
            display: block;
            padding: 1rem 1.25rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            color: var(--text);
            text-decoration: none;
            transition: border-color 0.15s, background 0.15s;
        }

        a:hover {
            border-color: var(--accent);
            background: #243040;
        }

        a strong {
            display: block;
            color: var(--accent);
            margin-bottom: 0.25rem;
        }

        a span {
            color: var(--muted);
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <main>
        <h1>Cursor Usage Dashboard</h1>
        <div class="locale-toolbar">
            <span class="locale-toolbar__label" data-i18n="locale">Sprache</span>
            <button type="button" class="locale-btn locale-btn--active" data-locale="de">DE</button>
            <button type="button" class="locale-btn" data-locale="en">EN</button>
        </div>
        <p data-i18n="hubSubtitle">Lokale Analyse der Cursor-Nutzung — CSV-Exporte und optional Live-Daten.</p>
        <ul>
            <li>
                <a href="cursor-usage-analytics.html">
                    <strong>Analytics</strong>
                    <span data-i18n="hubAnalyticsDesc">Kosten, Modelle, Muster und Budget</span>
                </a>
            </li>
        </ul>
    </main>
    <script src="static/cursor-analytics/i18n.js"></script>
    <script>
        function getI18n() {
            return window.CursorAnalytics?.i18n;
        }

        function t(key) {
            return getI18n()?.t(key) ?? key;
        }

        function applyI18nLabels() {
            document.querySelectorAll('[data-i18n]').forEach((el) => {
                const key = el.getAttribute('data-i18n');
                if (key) {
                    el.textContent = t(key);
                }
            });
            const locale = getI18n()?.getLocale() || 'de';
            document.querySelectorAll('[data-locale]').forEach((btn) => {
                btn.classList.toggle('locale-btn--active', btn.dataset.locale === locale);
            });
        }

        document.querySelectorAll('[data-locale]').forEach((btn) => {
            btn.addEventListener('click', () => {
                getI18n()?.switchLocale(btn.dataset.locale);
                applyI18nLabels();
            });
        });

        applyI18nLabels();
    </script>
</body>

</html>
