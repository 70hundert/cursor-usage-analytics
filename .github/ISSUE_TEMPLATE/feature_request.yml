name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        For larger changes, please describe the problem first — not only the solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do with Cursor usage data?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution (optional)
    validations:
      required: false

  - type: checkboxes
    id: scope
    attributes:
      label: Area (optional)
      options:
        - label: CSV import / parsing
        - label: Live API / proxy
        - label: Charts / analytics
        - label: Project markers
        - label: Multi-user setup
        - label: Documentation
