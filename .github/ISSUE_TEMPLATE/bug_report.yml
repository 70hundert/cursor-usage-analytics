name: Bug report
description: Something does not work as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please do **not** paste session tokens or CSV exports with real account data.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: What did you expect instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Copy config/users.example.json to config/users.json
        2. python serve.py
        3. …
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or git SHA

  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Windows
        - macOS
        - Linux
        - Other

  - type: dropdown
    id: browser
    attributes:
      label: Browser (if UI issue)
      options:
        - Chrome / Edge
        - Firefox
        - Safari
        - Other
        - N/A

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or console output
      render: shell
